# fly.toml app configuration file generated for balam-barberia-api on 2026-05-04T11:14:58-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'balam-barberia-api'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  PROJECT_NAME = 'Balam SaaS API'

[processes]
  app = 'uvicorn api.main:app --host 0.0.0.0 --port 8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
