version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: balam_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-balam_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-balam_pass}
      POSTGRES_DB: ${POSTGRES_DB:-balam_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: balam_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  openwa:
    build:
      context: ./OpenWA
      dockerfile: Dockerfile
    container_name: openwa-api
    ports:
      - "2785:2785"
    environment:
      - NODE_ENV=development
      - PORT=2785
      - DATABASE_TYPE=sqlite
      - DATABASE_NAME=/app/data/openwa.sqlite
      - DATABASE_SYNCHRONIZE=true
      - ENGINE_TYPE=whatsapp-web.js
      - SESSION_DATA_PATH=/app/data/sessions
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/data/media
      - WEBHOOK_TIMEOUT=10000
      - WEBHOOK_MAX_RETRIES=3
      - QUEUE_ENABLED=false
    volumes:
      - openwa_data:/app/data
    restart: unless-stopped

  openwa-dashboard:
    build:
      context: ./OpenWA/dashboard
      dockerfile: Dockerfile
    container_name: openwa-dashboard
    ports:
      - "2886:80"
    depends_on:
      - openwa
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  openwa_data:
