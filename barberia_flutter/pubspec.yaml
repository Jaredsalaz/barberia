name: barberia_flutter
description: App para gestión de citas del barbero - Balam Barber
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP y networking
  http: ^1.1.0
  web_socket_channel: ^2.4.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19

  # State management
  provider: ^6.0.0

  # Storage
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # Date/time formatting
  intl: ^0.19.0

  # UI
  cupertino_icons: ^1.0.2
  pull_to_refresh: ^2.0.0
  url_launcher: ^6.2.0
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
